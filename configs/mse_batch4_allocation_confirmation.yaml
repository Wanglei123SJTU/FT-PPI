input_csv: Code/wine_data.csv
output_dir: artifacts/mse_batch4_allocation_confirmation
seed: 20260612
population_seed: 20260612
split_seed: 20263612
replication_ids: [0, 1, 2, 3, 4]
resume_completed: true
save_adapter: false

population_size: 10000
budget: 1000
allocation_ratios: [0.025, 0.05, 0.075, 0.10]
validation_size: 100
losses: [mse]

model_name: Qwen/Qwen2.5-0.5B-Instruct
fallback_model_name: Qwen/Qwen2.5-1.5B-Instruct
max_length: 256
load_in_4bit: true
bf16: true
fp16: false
device_map: auto

lora_r: 4
lora_alpha: 4
lora_dropout: 0.05
target_modules: [q_proj, v_proj]
zero_init_regression_head: true

learning_rate: 1.0e-4
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2
max_steps: 200
num_train_epochs: 1
weight_decay: 0.0
evaluation_strategy: steps
eval_steps: 25
save_strategy: "no"
logging_steps: 25
