output_dir: artifacts/training_signal_probe_zerohead
resume_completed: true

base:
  input_csv: Code/wine_data.csv
  seed: 20260612
  population_seed: 20260612
  split_seed: 20261612
  replication_ids: [0]
  resume_completed: true
  save_adapter: false

  population_size: 10000
  budget: 1000
  allocation_ratios: [0.15]
  validation_size: 100
