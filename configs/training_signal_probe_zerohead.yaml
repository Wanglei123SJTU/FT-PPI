  max_steps: 200
  num_train_epochs: 1
  weight_decay: 0.0
  evaluation_strategy: steps
  eval_steps: 25
  save_strategy: "no"
  logging_steps: 25

variants:
  - name: zerohead_steps200_lr2e-5
    learning_rate: 2.0e-5
    max_steps: 200
  - name: zerohead_steps200_lr1e-4
    learning_rate: 1.0e-4
