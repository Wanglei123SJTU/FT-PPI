input_csv: Code/wine_data.csv
output_dir: artifacts/allocation_diagnostic
seed: 20260612
replication_id: 0
save_adapter: false

population_size: 10000
budget: 1000
allocation_ratios: [0.05, 0.10, 0.20]
validation_size: 100
losses: [mse, var]

model_name: Qwen/Qwen2.5-0.5B-Instruct
fallback_model_name: Qwen/Qwen2.5-1.5B-Instruct
max_length: 256
load_in_4bit: true
bf16: true
fp16: false
device_map: auto

lora_r: 4
lora_alpha: 4
lora_dropout: 0.05
target_modules: [q_proj, v_proj]

learning_rate: 2.0e-5
per_device_train_batch_size: 2
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
max_steps: 30
num_train_epochs: 1
weight_decay: 0.0
evaluation_strategy: steps
eval_steps: 10
save_strategy: "no"
logging_steps: 5
