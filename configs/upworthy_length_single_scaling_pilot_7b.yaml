input_csv: Data/upworthy_pairs_with_text_features.csv
output_dir: /gscratch/scrubbed/lei0603/ft-ppi/artifacts/upworthy_length_single_scaling_pilot_7b
seed: 20260618

target_feature: delta_LENGTH
feature_columns: [delta_LENGTH]
train_pool_size: 5000
validation_stop_size: 1000
validation_scale_size: 1000
s_grid: [100, 400, 800, 1600]
replication_ids: [0]
diagnostic_budgets: [300, 500, 1000, 2000, 5000]

methods:
  - name: mse_uniform
    loss: mse
    early_stopping_metric: mse
    sampling_strategy: uniform

  - name: ifvarq_warm2_uniform
    loss: ifvarq
    warmup_loss: mse
    warmup_epochs: 2
    early_stopping_metric: ifvarq
    sampling_strategy: uniform
    if_weight_clip: 4.0

  - name: frozen_mse_uniform
    loss: mse
    early_stopping_metric: mse
    sampling_strategy: uniform
    train_backbone: false
    head_lr: 1.0e-3
    batch_size: 16
    max_epochs: 10
    min_epochs: 3
    early_stopping_patience: 3

model_name: Qwen/Qwen2.5-7B-Instruct
max_length: 80
target_modules: [q_proj, k_proj, v_proj, o_proj]
lora_r: 4
lora_alpha: 8
lora_dropout: 0.05
lora_lr: 8.0e-5
head_lr: 2.0e-4
head_hidden_size: 128
weight_decay: 0.01
max_grad_norm: 1.0

batch_size: 8
oom_fallback_batch_sizes: [4, 2, 1]
prediction_batch_size: 8
log_every_epochs: 1
max_epochs: 8
min_epochs: 3
early_stopping_patience: 2
early_stopping_min_delta: 0.0
common_train_seed_within_rep: true
gradient_checkpointing: true
save_predictions: false
